<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Panel - Collected Data Viewer</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --pink-accent: #ff2a85;
            --purple-accent: #9d4edd;
            --text-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Glassmorphism Card Style */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Login Screen Container */
        #loginContainer {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(255, 42, 133, 0.5);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0aaff;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--pink-accent);
            box-shadow: 0 0 10px rgba(255, 42, 133, 0.4);
        }

        .btn {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        /* Admin Dashboard Container */
        #dashboardContainer {
            display: none;
            width: 100%;
            max-width: 1100px;
            padding: 30px;
            box-sizing: border-box;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .dashboard-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            padding: 8px 15px;
            width: auto;
            font-size: 0.85rem;
        }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            color: #d8b4fe;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--pink-accent), var(--purple-accent));
            color: white;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(255, 42, 133, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Control / Uploader layout */
        .controls {
            background: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .file-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #e0aaff;
        }

        input[type="file"] {
            color: #fff;
        }

        /* Viewer Display Area */
        .viewer-screen {
            width: 100%;
            height: 450px;
            border: 2px dashed var(--glass-border);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .placeholder-text {
            color: #b8c1ec;
            font-size: 0.95rem;
            text-align: center;
            padding: 20px;
        }

        .viewer-screen img, 
        .viewer-screen video, 
        .viewer-screen iframe {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            width: 100%;
            height: 100%;
            border: none;
        }

        .viewer-screen pre {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 15px;
            overflow: auto;
            background: #121019;
            color: #ff758c;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            text-align: left;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-download {
            background: linear-gradient(135deg, #10b981, #059669);
            width: auto;
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- 1. ADMIN LOGIN PANEL -->
    <div id="loginContainer" class="glass-card">
        <h2>🔒 Admin Login</h2>
        <div class="input-group">
            <label for="usernameInput">Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password">
        </div>
        <button class="btn" onclick="handleLogin()">Login Dashboard</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- 2. COLLECTED DATA VIEWER DASHBOARD (Protected) -->
    <div id="dashboardContainer" class="glass-card">
        <div class="dashboard-header">
            <h2>✨ Collected Data Admin Panel</h2>
            <button class="btn btn-logout" onclick="handleLogout()">Logout</button>
        </div>
        
        <!-- Category Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-target="facebook" onclick="switchTab('facebook')">📘 Facebook Data / Logins</button>
            <button class="tab-btn" data-target="camera" onclick="switchTab('camera')">📷 Camera Photos & Media</button>
            <button class="tab-btn" data-target="location" onclick="switchTab('location')">📍 Location Data Logs</button>
            <button class="tab-btn" data-target="ff" onclick="switchTab('ff')">🎮 Free Fire Data Logs</button>
        </div>

        <!-- 1. FACEBOOK DATA TAB -->
        <div id="facebook-section" class="tab-content active">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="facebookUpload">Upload Facebook Collected Credentials / JSON / Logs:</label>
                    <input type="file" id="facebookUpload" accept=".json,.txt,.csv" onchange="handleFile('facebook', event)">
                </div>
            </div>
            <div class="viewer-screen" id="facebookViewer">
                <div class="placeholder-text">No Facebook data file uploaded. Inspect captured info here.</div>
            </div>
            <div class="action-bar">
                <a id="facebookDownload" href="#" class="btn btn-download hidden" download>📥 Download Facebook Data</a>
            </div>
        </div>

        <!-- 2. CAMERA MEDIA TAB -->
        <div id="camera-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="cameraUpload">Upload Captured Camera Photos / Videos:</label>
                    <input type="file" id="cameraUpload" accept="image/*,video/*" onchange="handleFile('camera', event)">
                </div>
            </div>
            <div class="viewer-screen" id="cameraViewer">
                <div class="placeholder-text">No camera media uploaded yet.</div>
            </div>
            <div class="action-bar">
                <a id="cameraDownload" href="#" class="btn btn-download hidden" download>📥 Download Media File</a>
            </div>
        </div>

        <!-- 3. LOCATION DATA TAB -->
        <div id="location-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="locationUpload">Upload Location Tracker Log (JSON / CSV / TXT):</label>
                    <input type="file" id="locationUpload" accept=".json,.csv,.txt,.kml" onchange="handleFile('location', event)">
                </div>
            </div>
            <div class="viewer-screen" id="locationViewer">
                <div class="placeholder-text">No location log loaded.</div>
            </div>
            <div class="action-bar">
                <a id="locationDownload" href="#" class="btn btn-download hidden" download>📥 Download Location Log</a>
            </div>
        </div>

        <!-- 4. FREE FIRE DATA TAB -->
        <div id="ff-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="ffUpload">Upload Free Fire Payload / Config / JSON Data:</label>
                    <input type="file" id="ffUpload" accept=".json,.txt,.dat" onchange="handleFile('ff', event)">
                </div>
            </div>
            <div class="viewer-screen" id="ffViewer">
                <div class="placeholder-text">No Free Fire configuration data loaded.</div>
            </div>
            <div class="action-bar">
                <a id="ffDownload" href="#" class="btn btn-download hidden" download>📥 Download FF File</a>
            </div>
        </div>
    </div>

    <script>
        const correctUser = "sumit@1123";
        const correctPass = "sumit1123";

        // Check if already logged in via Session Storage
        window.onload = function() {
            if (sessionStorage.getItem("isAdminLoggedIn") === "true") {
                showDashboard();
            }
        };

        function handleLogin() {
            const user = document.getElementById("usernameInput").value.trim();
            const pass = document.getElementById("passwordInput").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            if (user === correctUser && pass === correctPass) {
                sessionStorage.setItem("isAdminLoggedIn", "true");
                showDashboard();
            } else {
                errorMsg.textContent = "Invalid Username or Password! Try again.";
            }
        }

        function showDashboard() {
            document.getElementById("loginContainer").classList.add("hidden");
            document.getElementById("dashboardContainer").style.display = "block";
        }

        function handleLogout() {
            sessionStorage.removeItem("isAdminLoggedIn");
            document.getElementById("dashboardContainer").style.display = "none";
            document.getElementById("loginContainer").classList.remove("hidden");
            document.getElementById("usernameInput").value = "";
            document.getElementById("passwordInput").value = "";
            document.getElementById("errorMsg").textContent = "";
        }

        // Active Object URLs tracker for memory cleanup
        const activeURLs = {
            facebook: null,
            camera: null,
            location: null,
            ff: null
        };

        function switchTab(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[data-target="${category}"]`).classList.add('active');
            document.getElementById(`${category}-section`).classList.add('active');
        }

        function handleFile(category, event) {
            const file = event.target.files[0];
            const viewer = document.getElementById(`${category}Viewer`);
            const downloadBtn = document.getElementById(`${category}Download`);

            if (!file) return;

            if (activeURLs[category]) {
                URL.revokeObjectURL(activeURLs[category]);
            }

            activeURLs[category] = URL.createObjectURL(file);

            downloadBtn.href = activeURLs[category];
            downloadBtn.download = file.name;
            downloadBtn.classList.remove('hidden');

            viewer.innerHTML = '';

            const fileType = file.type;
            const fileName = file.name.toLowerCase();

            if (category === 'camera') {
                if (fileType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = activeURLs[category];
                    viewer.appendChild(img);
                } else if (fileType.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = activeURLs[category];
                    video.controls = true;
                    viewer.appendChild(video);
                } else {
                    showUnsupported(viewer, file.name);
                }
            } else {
                // Text, JSON, logs, or general payload records
                if (fileType.includes('json') || fileType.includes('text') || fileName.endsWith('.json') || fileName.endsWith('.txt') || fileName.endsWith('.csv') || fileName.endsWith('.kml')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const pre = document.createElement('pre');
                        pre.textContent = e.target.result;
                        viewer.appendChild(pre);
                    };
                    reader.readAsText(file);
                } else if (fileType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = activeURLs[category];
                    viewer.appendChild(img);
                } else {
                    showUnsupported(viewer, file.name);
                }
            }
        }

        function showUnsupported(viewer, name) {
            const div = document.createElement('div');
            div.className = 'placeholder-text';
            div.innerHTML = `File preview not supported for <strong>${name}</strong>.<br>Use the download button below to access it.`;
            viewer.appendChild(div);
        }
    </script>
</body>
</html>
