<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Multi-Category Data & Media Viewer</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --accent-camera: #2563eb;
            --accent-ff: #d97706;
            --accent-insta: #db2777;
            --accent-location: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Category Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            overflow-x: auto;
        }

        .tab-btn {
            background-color: #e5e7eb;
            border: none;
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            color: #4b5563;
        }

        .tab-btn.active {
            color: white;
        }

        .tab-btn[data-target="camera"].active { background-color: var(--accent-camera); }
        .tab-btn[data-target="ff"].active { background-color: var(--accent-ff); }
        .tab-btn[data-target="insta"].active { background-color: var(--accent-insta); }
        .tab-btn[data-target="location"].active { background-color: var(--accent-location); }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .file-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4b5563;
        }

        input[type="file"] {
            font-size: 0.9rem;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-download {
            background-color: #10b981;
        }

        .btn-download:hover {
            background-color: #059669;
        }

        .viewer-screen {
            width: 100%;
            height: 450px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #fafafa;
            position: relative;
        }

        .placeholder-text {
            color: #9ca3af;
            font-size: 1rem;
            text-align: center;
            padding: 20px;
        }

        /* Screen Elements */
        .viewer-screen img, 
        .viewer-screen video, 
        .viewer-screen iframe {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            width: 100%;
            height: 100%;
            border: none;
        }

        .viewer-screen pre {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 15px;
            overflow: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            text-align: left;
        }

        .hidden {
            display: none !important;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Multi-Category Data & Media Viewer</h2>
        
        <!-- Category Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-target="camera" onclick="switchTab('camera')">📷 Camera Photos & Media</button>
            <button class="tab-btn" data-target="ff" onclick="switchTab('ff')">🎮 Free Fire Data</button>
            <button class="tab-btn" data-target="insta" onclick="switchTab('insta')">📸 Instagram Data</button>
            <button class="tab-btn" data-target="location" onclick="switchTab('location')">📍 Location Data</button>
        </div>

        <!-- 1. CAMERA PHOTOS & MEDIA TAB -->
        <div id="camera-section" class="tab-content active">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="cameraUpload">Select Camera Photos / Videos:</label>
                    <input type="file" id="cameraUpload" accept="image/*,video/*" onchange="handleFile('camera', event)">
                </div>
            </div>
            <div class="viewer-screen" id="cameraViewer">
                <div class="placeholder-text">No camera media uploaded yet.</div>
            </div>
            <div class="action-bar">
                <a id="cameraDownload" href="#" class="btn btn-download hidden" download>📥 Download File</a>
            </div>
        </div>

        <!-- 2. FREE FIRE DATA TAB -->
        <div id="ff-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="ffUpload">Upload Free Fire Config / JSON / Data File:</label>
                    <input type="file" id="ffUpload" accept=".json,.txt,.xml,.dat" onchange="handleFile('ff', event)">
                </div>
            </div>
            <div class="viewer-screen" id="ffViewer">
                <div class="placeholder-text">No Free Fire data file loaded.</div>
            </div>
            <div class="action-bar">
                <a id="ffDownload" href="#" class="btn btn-download hidden" download>📥 Download FF File</a>
            </div>
        </div>

        <!-- 3. INSTAGRAM DATA TAB -->
        <div id="insta-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="instaUpload">Upload Instagram Export / JSON / Media:</label>
                    <input type="file" id="instaUpload" accept=".json,.html,.txt,image/*" onchange="handleFile('insta', event)">
                </div>
            </div>
            <div class="viewer-screen" id="instaViewer">
                <div class="placeholder-text">No Instagram data file loaded.</div>
            </div>
            <div class="action-bar">
                <a id="instaDownload" href="#" class="btn btn-download hidden" download>📥 Download Insta File</a>
            </div>
        </div>

        <!-- 4. LOCATION DATA TAB -->
        <div id="location-section" class="tab-content">
            <div class="controls">
                <div class="file-input-wrapper">
                    <label for="locationUpload">Upload Location File (JSON / KML / CSV / Text):</label>
                    <input type="file" id="locationUpload" accept=".json,.kml,.csv,.txt" onchange="handleFile('location', event)">
                </div>
            </div>
            <div class="viewer-screen" id="locationViewer">
                <div class="placeholder-text">No Location data loaded.</div>
            </div>
            <div class="action-bar">
                <a id="locationDownload" href="#" class="btn btn-download hidden" download>📥 Download Location File</a>
            </div>
        </div>
    </div>

    <script>
        // Keep track of active object URLs for cleanup
        const activeURLs = {
            camera: null,
            ff: null,
            insta: null,
            location: null
        };

        function switchTab(category) {
            // Remove active states from tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Add active states to target
            document.querySelector(`[data-target="${category}"]`).classList.add('active');
            document.getElementById(`${category}-section`).classList.add('active');
        }

        function handleFile(category, event) {
            const file = event.target.files[0];
            const viewer = document.getElementById(`${category}Viewer`);
            const downloadBtn = document.getElementById(`${category}Download`);

            if (!file) return;

            // Revoke old URL if present
            if (activeURLs[category]) {
                URL.revokeObjectURL(activeURLs[category]);
            }

            activeURLs[category] = URL.createObjectURL(file);

            // Setup specific download button
            downloadBtn.href = activeURLs[category];
            downloadBtn.download = file.name;
            downloadBtn.classList.remove('hidden');

            // Clear viewer screen
            viewer.innerHTML = '';

            const fileType = file.type;
            const fileName = file.name.toLowerCase();

            // Render based on file category and format
            if (category === 'camera') {
                if (fileType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = activeURLs[category];
                    viewer.appendChild(img);
                } else if (fileType.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = activeURLs[category];
                    video.controls = true;
                    viewer.appendChild(video);
                } else {
                    showUnsupported(viewer, file.name);
                }
            } 
            else if (category === 'insta' && fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = activeURLs[category];
                viewer.appendChild(img);
            }
            else {
                // For Text/JSON/Config data formats (FF, Insta, Location)
                if (fileType.includes('json') || fileType.includes('text') || fileName.endsWith('.json') || fileName.endsWith('.txt') || fileName.endsWith('.csv') || fileName.endsWith('.kml') || fileName.endsWith('.html')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const pre = document.createElement('pre');
                        pre.textContent = e.target.result;
                        viewer.appendChild(pre);
                    };
                    reader.readAsText(file);
                } else if (fileType.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = activeURLs[category];
                    viewer.appendChild(img);
                } else {
                    showUnsupported(viewer, file.name);
                }
            }
        }

        function showUnsupported(viewer, name) {
            const div = document.createElement('div');
            div.className = 'placeholder-text';
            div.innerHTML = `Preview not directly supported for <strong>${name}</strong>.<br>Use the download button below to access the file.`;
            viewer.appendChild(div);
        }
    </script>
</body>
</html>
